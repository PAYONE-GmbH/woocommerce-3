name: Sync to Public Fork

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch to sync from private repo'
        required: true
        type: choice
        options:
          - main
          - feature/update-block-support
          - feature/cypress-e2e-tests
      target_branch:
        description: 'Branch name in public repo (auto-maps main→master)'
        required: false
        type: string
      squash_commits:
        description: 'Squash commits into single commit'
        required: true
        type: boolean
        default: true
      commit_message:
        description: 'Custom commit message (for squash)'
        required: false
        type: string

jobs:
  sync:
    name: Sync branch to public fork
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0  # Full history for squash merge

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Add public remote
        run: |
          git remote add public git@github.com:emperon-studio/payone-woocommerce-plugin.git

      - name: Setup SSH key for public repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PUBLIC_REPO_SSH_KEY }}

      - name: Fetch public branches
        run: |
          git fetch public

      - name: Determine target branch
        id: target
        run: |
          SOURCE="${{ inputs.source_branch }}"
          CUSTOM_TARGET="${{ inputs.target_branch }}"

          # Auto-map main → master, keep others as-is
          if [ "$SOURCE" = "main" ] && [ -z "$CUSTOM_TARGET" ]; then
            TARGET="master"
          elif [ -n "$CUSTOM_TARGET" ]; then
            TARGET="$CUSTOM_TARGET"
          else
            TARGET="$SOURCE"
          fi

          echo "target_branch=$TARGET" >> $GITHUB_OUTPUT
          echo "📍 Source: $SOURCE → Target: $TARGET"

      - name: Sync with squash (if enabled)
        if: ${{ inputs.squash_commits }}
        run: |
          TARGET="${{ steps.target.outputs.target_branch }}"
          SOURCE="${{ inputs.source_branch }}"

          # Check if target branch exists in public repo
          if git ls-remote --heads public | grep -q "refs/heads/$TARGET"; then
            echo "✅ Target branch exists, creating squash merge"
            git checkout -b temp-sync public/$TARGET
          else
            echo "🆕 Target branch doesn't exist, creating orphan branch"
            git checkout --orphan temp-sync
            git rm -rf . 2>/dev/null || true
          fi

          # Squash merge from source
          git merge --squash $SOURCE

          # Determine commit message
          if [ -n "${{ inputs.commit_message }}" ]; then
            COMMIT_MSG="${{ inputs.commit_message }}"
          else
            COMMIT_COUNT=$(git rev-list --count public/$TARGET..$SOURCE 2>/dev/null || echo "unknown")
            COMMIT_MSG="Sync from private repo: $SOURCE ($COMMIT_COUNT commits)"
          fi

          git commit -m "$COMMIT_MSG"

          # Force push to target branch
          git push public temp-sync:$TARGET --force

      - name: Sync without squash (direct push)
        if: ${{ !inputs.squash_commits }}
        run: |
          TARGET="${{ steps.target.outputs.target_branch }}"
          SOURCE="${{ inputs.source_branch }}"

          git push public $SOURCE:$TARGET --force

      - name: Summary
        run: |
          echo "✅ Successfully synced to public fork"
          echo ""
          echo "📊 Details:"
          echo "  Source: ${{ inputs.source_branch }}"
          echo "  Target: ${{ steps.target.outputs.target_branch }}"
          echo "  Squashed: ${{ inputs.squash_commits }}"
          echo ""
          echo "🔗 View in public repo:"
          echo "  https://github.com/emperon-studio/payone-woocommerce-plugin/tree/${{ steps.target.outputs.target_branch }}"
